name: Aggiorna segnali book
on:
  schedule:
    - cron: "40 6 * * *"     # ogni giorno 06:40 UTC (08:40 IT estate) dopo la chiusura daily
  workflow_dispatch: {}       # pulsante "Run workflow" per lanciarlo a mano
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install --quiet numpy pandas yfinance
      - run: python compute_signals_web.py
      - name: Commit segnali
        run: |
          git config user.name "book-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/signal.json docs/window_history.json
          git diff --cached --quiet || git commit -m "segnali $(date -u +%F)"
          git push
